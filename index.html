<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ярослав и Мария</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      font-family: Georgia, serif;
      color: #4b2730;
      background: #f1e7d8;
    }

    main {
      padding: 40px 20px;
    }

    p {
      margin: 0 0 20px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font: 12px Arial, sans-serif;
    }

    h1 {
      margin: 0;
      font-size: clamp(50px, 10vw, 110px);
      font-weight: normal;
    }

    .date {
      margin-top: 30px;
      color: #7b3544;
      font-size: 24px;
    }
  </style>
</head>

<body>
  <main>
    <p>Сайт успешно работает</p>
    <h1>Ярослав & Мария</h1>
    <div class="date">Наша свадьба</div>
  </main>
</body>
</html>
